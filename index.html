<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Robô Auto-Programável</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@400;600;800&display=swap" rel="stylesheet"/>
<style>
  :root{--bg:#080c10;--surface:#0d1117;--surface2:#131920;--border:#1e2d3d;--accent:#00d4ff;--accent2:#7c3aed;--green:#00ff87;--amber:#ffb347;--red:#ff4757;--text:#e8f4fd;--muted:#4a6078;--mono:'Space Mono',monospace;--sans:'Syne',sans-serif;}
  *{box-sizing:border-box;margin:0;padding:0;}
  html,body{height:100%;background:var(--bg);color:var(--text);font-family:var(--sans);overflow:hidden;}
  .app{display:grid;grid-template-columns:270px 1fr;grid-template-rows:60px 1fr;height:100vh;}
  header{grid-column:1/-1;background:var(--surface);border-bottom:1px solid var(--border);display:flex;align-items:center;gap:14px;padding:0 24px;}
  .logo-ring{width:36px;height:36px;border-radius:50%;border:2px solid var(--accent);display:flex;align-items:center;justify-content:center;font-size:18px;box-shadow:0 0 12px #00d4ff44;animation:pulse 2s ease-in-out infinite;}
  @keyframes pulse{0%,100%{box-shadow:0 0 8px #00d4ff44;}50%{box-shadow:0 0 20px #00d4ff88;}}
  header h1{font-size:16px;font-weight:800;letter-spacing:1px;color:var(--accent);}
  .sdot{width:8px;height:8px;border-radius:50%;background:var(--green);margin-left:auto;box-shadow:0 0 6px var(--green);animation:blink 1.5s infinite;}
  @keyframes blink{0%,100%{opacity:1}50%{opacity:.3}}
  .slabel{font-size:11px;color:var(--green);font-family:var(--mono);margin-left:6px;}
  aside{background:var(--surface);border-right:1px solid var(--border);overflow-y:auto;padding:16px;display:flex;flex-direction:column;gap:16px;}
  aside::-webkit-scrollbar{width:3px;}aside::-webkit-scrollbar-thumb{background:var(--border);}
  .panel-title{font-size:10px;letter-spacing:2px;text-transform:uppercase;color:var(--muted);font-family:var(--mono);padding-bottom:8px;border-bottom:1px solid var(--border);}
  .stats-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;}
  .stat-card{background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:10px 12px;transition:border-color .2s;}
  .stat-card:hover{border-color:var(--accent);}
  .stat-n{font-size:22px;font-weight:800;font-family:var(--mono);color:var(--accent);}
  .stat-l{font-size:10px;color:var(--muted);margin-top:2px;}
  .brain-section{display:flex;flex-direction:column;gap:6px;}
  .brain-item{background:var(--surface2);border:1px solid var(--border);border-radius:6px;padding:8px 10px;font-size:11px;font-family:var(--mono);color:var(--text);border-left:3px solid var(--accent2);word-break:break-word;}
  .brain-item.formula{border-left-color:var(--green);}
  .brain-item.resposta{border-left-color:var(--amber);}
  .tag{display:inline-block;font-size:9px;padding:1px 6px;border-radius:4px;margin-bottom:4px;letter-spacing:1px;}
  .tag-regra{background:#7c3aed22;color:var(--accent2);border:1px solid var(--accent2);}
  .tag-form{background:#00ff8722;color:var(--green);border:1px solid var(--green);}
  .tag-resp{background:#ffb34722;color:var(--amber);border:1px solid var(--amber);}
  .empty-msg{font-size:12px;color:var(--muted);font-family:var(--mono);text-align:center;padding:12px 0;}
  main{display:flex;flex-direction:column;overflow:hidden;}
  #chat{flex:1;overflow-y:auto;padding:24px 28px;display:flex;flex-direction:column;gap:16px;scroll-behavior:smooth;}
  #chat::-webkit-scrollbar{width:4px;}#chat::-webkit-scrollbar-thumb{background:var(--border);border-radius:4px;}
  .msg{display:flex;gap:12px;max-width:78%;animation:fadein .25s ease;}
  @keyframes fadein{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}
  .msg.user{align-self:flex-end;flex-direction:row-reverse;}
  .msg.robo{align-self:flex-start;}
  .avatar{width:34px;height:34px;border-radius:50%;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:16px;}
  .avatar.r{background:var(--surface2);border:1px solid var(--accent);box-shadow:0 0 8px #00d4ff22;}
  .avatar.u{background:var(--surface2);border:1px solid var(--accent2);}
  .bubble{padding:12px 16px;border-radius:12px;font-size:14px;line-height:1.6;max-width:100%;}
  .msg.robo .bubble{background:var(--surface2);border:1px solid var(--border);border-top-left-radius:2px;}
  .msg.user .bubble{background:#0d2137;border:1px solid #1a3a52;border-top-right-radius:2px;}
  .bubble.aprendizado{border-color:var(--accent2);background:#16072a;}
  .bubble.algebra,.bubble.formula{border-color:var(--green);background:#071a0f;}
  .bubble.imagem{border-color:var(--amber);background:#1a1200;}
  .img-preview{max-width:200px;max-height:140px;border-radius:8px;border:1px solid var(--border);margin-bottom:8px;display:block;}
  .typing{display:flex;gap:5px;align-items:center;padding:14px 16px;}
  .dot{width:7px;height:7px;border-radius:50%;background:var(--muted);animation:bounce .9s infinite;}
  .dot:nth-child(2){animation-delay:.15s}.dot:nth-child(3){animation-delay:.3s}
  @keyframes bounce{0%,60%,100%{transform:translateY(0)}30%{transform:translateY(-6px)}}
  .input-area{padding:12px 24px 16px;border-top:1px solid var(--border);background:var(--surface);display:flex;gap:8px;align-items:flex-end;}
  #msg{flex:1;background:var(--surface2);border:1px solid var(--border);border-radius:10px;padding:12px 16px;color:var(--text);font-family:var(--sans);font-size:14px;resize:none;outline:none;transition:border-color .2s;min-height:46px;max-height:120px;line-height:1.5;}
  #msg:focus{border-color:var(--accent);}
  #msg::placeholder{color:var(--muted);}
  .btn-icon{width:46px;height:46px;border-radius:10px;border:1px solid var(--border);background:var(--surface2);color:var(--text);font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .15s;flex-shrink:0;}
  .btn-icon:hover{border-color:var(--accent);color:var(--accent);}
  #btn{background:var(--accent);color:#000;border:none;}
  #btn:hover{background:#33ddff;}
  #btn:active,#btn-img:active{transform:scale(.95);}
  #file-input{display:none;}
  .hints{padding:0 24px 8px;display:flex;gap:8px;flex-wrap:wrap;}
  .hint-chip{font-size:11px;font-family:var(--mono);padding:4px 10px;border-radius:20px;cursor:pointer;border:1px solid var(--border);background:var(--surface2);color:var(--muted);transition:all .15s;}
  .hint-chip:hover{border-color:var(--accent);color:var(--accent);}
</style>
</head>
<body>
<div class="app">
  <header>
    <div class="logo-ring">🤖</div>
    <h1>ROBÔ AUTO-PROGRAMÁVEL</h1>
    <span style="font-size:12px;color:var(--muted);font-family:var(--mono);margin-left:4px;">v3.0</span>
    <div style="margin-left:auto;display:flex;align-items:center;gap:6px;">
      <div class="sdot"></div><span class="slabel">ONLINE</span>
    </div>
  </header>

  <aside>
    <div>
      <div class="panel-title">Cérebro</div>
      <div class="stats-grid">
        <div class="stat-card"><div class="stat-n" id="s-conv">0</div><div class="stat-l">conversas</div></div>
        <div class="stat-card"><div class="stat-n" id="s-apr">0</div><div class="stat-l">aprendizagens</div></div>
        <div class="stat-card"><div class="stat-n" id="s-reg">0</div><div class="stat-l">regras</div></div>
        <div class="stat-card"><div class="stat-n" id="s-form">0</div><div class="stat-l">fórmulas</div></div>
      </div>
    </div>
    <div>
      <div class="panel-title">Regras Ativas</div>
      <div class="brain-section" id="lista-regras"><div class="empty-msg">nenhuma regra ainda</div></div>
    </div>
    <div>
      <div class="panel-title">Fórmulas</div>
      <div class="brain-section" id="lista-formulas"><div class="empty-msg">nenhuma fórmula ainda</div></div>
    </div>
    <div>
      <div class="panel-title">Respostas</div>
      <div class="brain-section" id="lista-respostas"><div class="empty-msg">nenhuma resposta ainda</div></div>
    </div>
  </aside>

  <main>
    <div id="chat"></div>
    <div class="hints">
      <span class="hint-chip" onclick="inserir('se o usuario disser \"oi\" entao \"Olá! Tudo bem?\"')">+ Regra</span>
      <span class="hint-chip" onclick="inserir('area do circulo = pi * r**2')">+ Fórmula</span>
      <span class="hint-chip" onclick="inserir('2x + 3 = 7')">Álgebra</span>
      <span class="hint-chip" onclick="inserir('calcular area do circulo com r=5')">Usar Fórmula</span>
      <span class="hint-chip" onclick="inserir('quando perguntarem \"capital do brasil\" responda \"Brasília\"')">+ Resposta</span>
    </div>
    <div class="input-area">
      <textarea id="msg" placeholder="Fale, ensine ou pergunte algo..." rows="1"></textarea>
      <button class="btn-icon" id="btn-img" title="Enviar imagem para o robô aprender">🖼</button>
      <input type="file" id="file-input" accept="image/*"/>
      <button class="btn-icon" id="btn" title="Enviar">▶</button>
    </div>
  </main>
</div>

<script>
const chat = document.getElementById('chat');
const msgEl = document.getElementById('msg');

function addMsg(texto, quem, tipo='normal', imgSrc=null) {
  const div = document.createElement('div');
  div.className = 'msg ' + quem;
  const av = document.createElement('div');
  av.className = 'avatar ' + (quem==='robo'?'r':'u');
  av.textContent = quem==='robo' ? '🤖' : '👤';
  const b = document.createElement('div');
  b.className = 'bubble ' + (quem==='robo' ? tipo : '');
  if (imgSrc) {
    const img = document.createElement('img');
    img.src = imgSrc; img.className = 'img-preview';
    b.appendChild(img);
  }
  const t = document.createElement('span');
  t.innerHTML = texto.replace(/\n/g,'<br>');
  b.appendChild(t);
  div.appendChild(av); div.appendChild(b);
  chat.appendChild(div);
  chat.scrollTop = chat.scrollHeight;
}

function showTyping() {
  const d = document.createElement('div');
  d.className = 'msg robo'; d.id = 'typing';
  d.innerHTML = `<div class="avatar r">🤖</div><div class="bubble"><div class="typing"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div></div>`;
  chat.appendChild(d); chat.scrollTop = chat.scrollHeight;
}
function hideTyping() { const t = document.getElementById('typing'); if(t) t.remove(); }

function atualizar_cerebro(data) {
  if (!data) return;
  document.getElementById('s-conv').textContent  = data.stats?.conversas ?? 0;
  document.getElementById('s-apr').textContent   = data.stats?.aprendizagens ?? 0;
  document.getElementById('s-reg').textContent   = data.regras?.length ?? 0;
  document.getElementById('s-form').textContent  = Object.keys(data.formulas||{}).length;
  const lr = document.getElementById('lista-regras');
  lr.innerHTML = '';
  if (data.regras?.length) {
    data.regras.forEach(r => { const d = document.createElement('div'); d.className='brain-item'; d.innerHTML=`<span class="tag tag-regra">REGRA</span><br>${r.gatilho}`; lr.appendChild(d); });
  } else lr.innerHTML = '<div class="empty-msg">nenhuma regra ainda</div>';
  const lf = document.getElementById('lista-formulas');
  lf.innerHTML = '';
  if (Object.keys(data.formulas||{}).length) {
    Object.entries(data.formulas).forEach(([n,d]) => { const el = document.createElement('div'); el.className='brain-item formula'; el.innerHTML=`<span class="tag tag-form">FÓRMULA</span><br>${n} = ${d.expr}`; lf.appendChild(el); });
  } else lf.innerHTML = '<div class="empty-msg">nenhuma fórmula ainda</div>';
  const lrs = document.getElementById('lista-respostas');
  lrs.innerHTML = '';
  if (Object.keys(data.respostas||{}).length) {
    Object.entries(data.respostas).forEach(([p,r]) => { const el = document.createElement('div'); el.className='brain-item resposta'; el.innerHTML=`<span class="tag tag-resp">RESP</span><br>${p} → ${r}`; lrs.appendChild(el); });
  } else lrs.innerHTML = '<div class="empty-msg">nenhuma resposta ainda</div>';
}

async function enviar() {
  const texto = msgEl.value.trim();
  if (!texto) return;
  addMsg(texto, 'user');
  msgEl.value = ''; msgEl.style.height = 'auto';
  showTyping();
  try {
    const res = await fetch('/api/chat', {method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({mensagem: texto})});
    const data = await res.json();
    hideTyping();
    addMsg(data.resposta, 'robo', data.tipo || 'normal');
    if (data.cerebro) atualizar_cerebro(data.cerebro);
    else { const cb = await fetch('/api/cerebro'); atualizar_cerebro(await cb.json()); }
  } catch(e) {
    hideTyping();
    addMsg('Erro ao conectar com o servidor.', 'robo', 'erro');
  }
}

async function enviarImagem(file) {
  const reader = new FileReader();
  reader.onload = async (e) => {
    const dataUrl = e.target.result;
    const base64 = dataUrl.split(',')[1];
    const mediaType = file.type || 'image/jpeg';
    addMsg('📷 Enviando imagem para o robô aprender...', 'user', '', dataUrl);
    showTyping();
    try {
      const res = await fetch('/api/imagem', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({imagem: base64, tipo: mediaType})
      });
      const data = await res.json();
      hideTyping();
      if (data.erro) {
        addMsg('❌ Erro: ' + data.erro, 'robo', 'erro');
        return;
      }
      addMsg(`🔍 Texto extraído da imagem:\n"${data.texto_extraido}"\n\n${data.aprendizado}`, 'robo', 'imagem');
      if (data.cerebro) atualizar_cerebro(data.cerebro);
      else { const cb = await fetch('/api/cerebro'); atualizar_cerebro(await cb.json()); }
    } catch(err) {
      hideTyping();
      addMsg('Erro ao processar imagem.', 'robo', 'erro');
    }
  };
  reader.readAsDataURL(file);
}

document.getElementById('btn').addEventListener('click', enviar);
msgEl.addEventListener('keydown', e => { if(e.key==='Enter' && !e.shiftKey){e.preventDefault();enviar();} });
msgEl.addEventListener('input', () => { msgEl.style.height='auto'; msgEl.style.height=Math.min(msgEl.scrollHeight,120)+'px'; });
document.getElementById('btn-img').addEventListener('click', () => document.getElementById('file-input').click());
document.getElementById('file-input').addEventListener('change', e => { if(e.target.files[0]) enviarImagem(e.target.files[0]); e.target.value=''; });

// drag & drop na área de chat
chat.addEventListener('dragover', e => e.preventDefault());
chat.addEventListener('drop', e => { e.preventDefault(); const f = e.dataTransfer.files[0]; if(f && f.type.startsWith('image/')) enviarImagem(f); });

function inserir(texto) { msgEl.value = texto; msgEl.focus(); }

(async () => {
  addMsg('Olá! Sou o Robô Auto-Programável 🤖\nPode digitar, me ensinar regras e fórmulas, ou enviar uma imagem clicando no 🖼 para eu aprender com ela!', 'robo');
  try { const cb = await fetch('/api/cerebro'); atualizar_cerebro(await cb.json()); } catch(e) {}
})();
</script>
</body>
</html>
